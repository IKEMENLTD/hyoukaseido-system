[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ==============================================================
# セキュリティヘッダー
# ==============================================================
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' https://*.supabase.co wss://*.supabase.co; frame-ancestors 'none'"

# ==============================================================
# Cronジョブ設定ガイド
# Netlifyには組み込みCron機能がないため、外部サービスを使用
# 推奨: cron-job.org / EasyCron / CloudFlare Workers
#
# 各エンドポイントにHTTP GETリクエストを送信してください
# ヘッダー: Authorization: Bearer ${CRON_SECRET}
#
# エンドポイント一覧:
#   /api/cron/eval-reminder         毎日 09:00 JST (0 0 * * *)
#   /api/cron/okr-checkin           毎週月曜 09:00 JST (0 0 * * 1)
#   /api/cron/okr-review            毎日 09:00 JST (0 0 * * *)
#   /api/cron/one-on-one-reminder   毎月1日 09:00 JST (0 0 1 * *)
#   /api/cron/win-session-reminder  毎週金曜 09:00 JST (0 0 * * 5)
#
# 設定手順 (cron-job.org の例):
#   1. https://cron-job.org でアカウント作成
#   2. 「Create cronjob」で以下を設定:
#      - URL: https://<your-site>.netlify.app/api/cron/<endpoint>
#      - Schedule: 上記のcron式を参照 (タイムゾーンはAsia/Tokyo)
#      - HTTP Method: GET
#      - Headers: Authorization: Bearer <CRON_SECRET の値>
#   3. 5つのエンドポイント全てに対してジョブを作成
#
# 環境変数:
#   CRON_SECRET は Netlify Dashboard > Site settings > Environment variables
#   で設定してください
# ==============================================================
