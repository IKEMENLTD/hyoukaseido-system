<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>オフライン - 評価制度システム</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050505; color: #e5e5e5; font-family: system-ui, sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { border: 1px solid #1a1a1a; background: #0a0a0a; padding: 3rem; max-width: 28rem; text-align: center; }
    h2 { font-size: 1.125rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { font-size: 0.875rem; color: #737373; }
    .accent { color: #3b82f6; }
  </style>
</head>
<body>
  <div class="container">
    <h2>オフラインです</h2>
    <p>ネットワーク接続が確認できません。<br>接続を復元してから<span class="accent">再読み込み</span>してください。</p>
  </div>
</body>
</html>
